<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Hub Finder</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* (tout ton CSS est inchangé) */
</style>
</head>

<body class="flex flex-col items-center justify-center p-4">

<!-- (tout ton HTML est inchangé) -->

<script>

document.getElementById("acceptDisclaimer").onclick = ()=>{
document.getElementById("disclaimerModal").style.display="none"
}

const hubs={
"chilli hub":`loadstring(game:HttpGet("https://rawscripts.net/raw/Steal-a-Brainrot-KEYLESS-TRUE-THE-BEST-STEAL-A-BRAINROT-SCRIPT-45137"))()`,
"nameless hub":`loadstring(game:HttpGet("https://rawscripts.net/raw/Universal-Script-nameless-hub-94511"))()`,
"lumin hub":`loadstring(game:HttpGet("https://rawscripts.net/raw/Steal-a-Brainrot-OP-STEAL-STUFF-43223"))()`,
"kurd hub":`loadstring(game:HttpGet("https://rawscripts.net/raw/Universal-Script-Kurd-Hub-29484"))()`,
"sun hub":`loadstring(game:HttpGet("https://api.luarmor.net/files/v4/loaders/623c61e59524bc04f458c6f6dd2c3f8b.lua"))()`,
"example hub":`INSERT SCRIPT HERE`
};

// --- BloxScript database ---
const bloxScripts = {
"blade ball": "https://bloxscript.net/raw/blade-ball.txt",
"fruit battlegrounds": "https://bloxscript.net/raw/fruit-battlegrounds.txt",
"doors": "https://bloxscript.net/raw/doors.txt"
};

// --- ScriptBlox API (version améliorée) ---
async function searchScriptBloxSmart(query) {
    try {
        const res = await fetch(`https://scriptblox.com/api/script/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();

        if (!data?.result?.scripts?.length) return null;

        const scripts = data.result.scripts;

        // 1. EXACT MATCH
        let exact = scripts.find(s => s.title.toLowerCase() === query.toLowerCase());
        if (exact) return formatSB(exact);

        // 2. CONTAINS ALL WORDS
        let words = query.toLowerCase().split(" ");
        let allWords = scripts.find(s => words.every(w => s.title.toLowerCase().includes(w)));
        if (allWords) return formatSB(allWords);

        // 3. PARTIAL MATCH
        let partial = scripts.find(s => s.title.toLowerCase().includes(query.toLowerCase()));
        if (partial) return formatSB(partial);

        // 4. FALLBACK: first result
        return formatSB(scripts[0]);

    } catch (err) {
        console.error("ScriptBlox API error:", err);
        return null;
    }
}

function formatSB(script) {
    if (script.script) {
        return {
            name: script.title + " (ScriptBlox)",
            code: script.script
        };
    }
    if (script.rawUrl) {
        return {
            name: script.title + " (ScriptBlox)",
            code: `loadstring(game:HttpGet("${script.rawUrl}"))()`
        };
    }
    return null;
}

// --- Levenshtein (correction fautes) ---
function levenshtein(a, b) {
const matrix = Array.from({ length: a.length + 1 }, (_, i) =>
Array.from({ length: b.length + 1 }, (_, j) => (i === 0 ? j : j === 0 ? i : 0))
);

for (let i = 1; i <= a.length; i++) {
for (let j = 1; j <= b.length; j++) {
const cost = a[i - 1] === b[j - 1] ? 0 : 1;
matrix[i][j] = Math.min(
matrix[i - 1][j] + 1,
matrix[i][j - 1] + 1,
matrix[i - 1][j - 1] + cost
);
}
}
return matrix[a.length][b.length];
}

function findClosest(input, list) {
let best = null;
let bestScore = Infinity;

for (let item of list) {
const score = levenshtein(input, item);
if (score < bestScore) {
bestScore = score;
best = item;
}
}

return bestScore <= 3 ? best : null;
}

const btn=document.getElementById("checkBtn")
const btnMobile=document.getElementById("checkBtnMobile")

const input=document.getElementById("hubInput")
const inputMobile=document.getElementById("hubInputMobile")

const terminal=document.getElementById("terminalOutput")
const results=document.getElementById("resultsSection")
const suggestionsDiv=document.getElementById("suggestions")
const copyBtn=document.getElementById("copyBtn")

let currentScript=""

btn.onclick=searchHub

btnMobile.onclick=()=>{
input.value=inputMobile.value
searchHub()
}

input.addEventListener("keypress",e=>{
if(e.key==="Enter") searchHub()
})

inputMobile.addEventListener("keypress",e=>{
if(e.key==="Enter"){
input.value=inputMobile.value
searchHub()
}
})

input.addEventListener("input",showSuggestions)

function showSuggestions(){

let value=input.value.toLowerCase()
suggestionsDiv.innerHTML=""

if(!value) return

for(let hub in hubs){

if(hub.includes(value)){

let div=document.createElement("div")
div.textContent=hub
div.className="suggestion-item"

div.onclick=()=>{
input.value=hub
suggestionsDiv.innerHTML=""
}

suggestionsDiv.appendChild(div)

}

}

}

async function searchHub(){

let name=input.value.toLowerCase().trim()

results.classList.remove("hidden")
terminal.textContent=""
copyBtn.style.display="none"

await typeText("> Searching hub database...\n")

let foundScript=null
let foundName=null

// --- Recherche interne ---
for(let hub in hubs){
if(hub.includes(name) || name.includes(hub.replace(" hub",""))){
foundScript=hubs[hub]
foundName=hub
break
}
}

// --- Correction interne ---
if (!foundScript) {
const closestHub = findClosest(name, Object.keys(hubs));
if (closestHub) {
foundScript = hubs[closestHub];
foundName = closestHub + " (corrected)";
}
}

// --- Recherche BloxScript ---
if (!foundScript) {
for (let scriptName in bloxScripts) {
if (name.includes(scriptName)) {
foundName = scriptName + " (BloxScript)";
foundScript = `loadstring(game:HttpGet("${bloxScripts[scriptName]}"))()`;
break;
}
}
}

// --- Correction BloxScript ---
if (!foundScript) {
const closestBlox = findClosest(name, Object.keys(bloxScripts));
if (closestBlox) {
foundName = closestBlox + " (BloxScript corrected)";
foundScript = `loadstring(game:HttpGet("${bloxScripts[closestBlox]}"))()`;
}
}

// --- ScriptBlox API améliorée ---
if (!foundScript) {
await typeText("> Searching ScriptBlox API...\n");

const sb = await searchScriptBloxSmart(name);

if (sb) {
foundName = sb.name;
foundScript = sb.code;
}
}

// --- Résultat final ---
if(foundScript){

currentScript=foundScript

await typeText(`> Hub found: ${foundName}\n\n`)
await typeText(foundScript)

copyBtn.style.display="block"

}else{

await typeText("> Hub not found\n")
await typeText("No script available for this hub.")

}

}

function typeText(text){

return new Promise(resolve=>{

let i=0

let interval=setInterval(()=>{

if(i<text.length){

terminal.textContent+=text.charAt(i)
i++

}else{

clearInterval(interval)
resolve()

}

},15)

})

}

copyBtn.onclick=()=>{

if(!currentScript) return

navigator.clipboard.writeText(currentScript)

copyBtn.innerText="COPIED"

setTimeout(()=>{
copyBtn.innerText="COPY SCRIPT"
},1500)

}

</script>

</body>
</html>
