<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" type="image/png" href="/favicon.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Hub Finder</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:800px;
max-width:95%;
}

h1{
font-size:40px;
text-align:center;
margin-bottom:10px;
}

.search{
display:flex;
gap:10px;
margin-top:30px;
}

input{
flex:1;
padding:12px;
background:#1e293b;
border:1px solid #334155;
border-radius:6px;
color:white;
}

button{
padding:12px 20px;
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.terminal{
margin-top:30px;
background:#020617;
padding:20px;
border-left:4px solid #3b82f6;
font-family:monospace;
min-height:120px;
white-space:pre-wrap;
}

.copyBtn{
margin-top:10px;
display:none;
}

.suggestion{
font-size:13px;
color:#94a3b8;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Script Hub Finder</h1>

<div class="search">

<input id="hubInput" placeholder="ex: chilli hub">

<button onclick="searchHub()">SEARCH</button>

</div>

<div id="suggestions"></div>

<div class="terminal" id="terminal"></div>

<button id="copyBtn" class="copyBtn" onclick="copyScript()">
COPY SCRIPT
</button>

</div>


<script>

const hubs={

"chilli hub":
`loadstring(game:HttpGet("https://rawscripts.net/raw/Steal-a-Brainrot-KEYLESS-TRUE-THE-BEST-STEAL-A-BRAINROT-SCRIPT-45137"))()`,

"nameless hub":
`loadstring(game:HttpGet("https://rawscripts.net/raw/Universal-Script-nameless-hub-94511"))()`,

"lumin hub":
`loadstring(game:HttpGet("https://rawscripts.net/raw/Steal-a-Brainrot-OP-STEAL-STUFF-43223"))()`,

"kurd hub":
`loadstring(game:HttpGet("https://rawscripts.net/raw/Universal-Script-Kurd-Hub-29484"))()`,

"sun hub":
`loadstring(game:HttpGet("https://api.luarmor.net/files/v4/loaders/623c61e59524bc04f458c6f6dd2c3f8b.lua"))()`

}

const input=document.getElementById("hubInput")
const terminal=document.getElementById("terminal")
const suggestions=document.getElementById("suggestions")
const copyBtn=document.getElementById("copyBtn")

let currentScript=""

input.addEventListener("input",showSuggestions)

input.addEventListener("keypress",e=>{
if(e.key==="Enter") searchHub()
})

function showSuggestions(){

let value=input.value.toLowerCase()

suggestions.innerHTML=""

if(!value) return

for(let hub in hubs){

if(hub.includes(value)){

let div=document.createElement("div")

div.className="suggestion"

div.innerText=hub

div.onclick=()=>{

input.value=hub

suggestions.innerHTML=""

}

suggestions.appendChild(div)

}

}

}

async function searchHub(){

let name=input.value.toLowerCase().trim()

terminal.textContent=""

copyBtn.style.display="none"

await typeText("> Initiating hub search...\n")

await typeText("> Searching database...\n")

let foundScript=null

let foundName=null

for(let hub in hubs){

if(hub.includes(name) || name.includes(hub.replace(" hub",""))){

foundScript=hubs[hub]

foundName=hub

break

}

}

if(foundScript){

currentScript=foundScript

await typeText(`> Hub found: ${foundName}\n`)

await typeText("> Loading script...\n\n")

await typeText(foundScript)

copyBtn.style.display="block"

}else{

await typeText("> Hub not found\n")

await typeText("No script available.")

}

}

function typeText(text){

return new Promise(resolve=>{

let i=0

let interval=setInterval(()=>{

if(i<text.length){

terminal.textContent+=text.charAt(i)

i++

}else{

clearInterval(interval)

resolve()

}

},15)

})

}

function copyScript(){

navigator.clipboard.writeText(currentScript)

copyBtn.innerText="COPIED"

setTimeout(()=>{

copyBtn.innerText="COPY SCRIPT"

},1500)

}

</script>

</body>
</html>
